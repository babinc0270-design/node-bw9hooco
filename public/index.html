<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelCatch | Professional Downloader</title>
    <style>
        /* Base & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- THE CINEMATIC IMAGE BACKGROUND --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        .bg-image {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            /* Change village.jpg to village.png if your file is a PNG! */
            background: url('village.jpg') center/cover no-repeat;
            filter: brightness(0.7) contrast(1.1);
            animation: kenBurns 30s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.08) translate(-2%, -1%); }
        }

        /* Magical Floating Particles (Fireflies) */
        .firefly {
            position: absolute;
            background: #ffda4a;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffda4a, 0 0 15px #ffda4a;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.5); }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, #f09433, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        /* Professional Glass Card */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255,255,255,0.8);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .container h2 { font-size: 26px; color: #1a1a1a; margin-bottom: 8px; }
        .container p { color: #555; margin-bottom: 25px; font-size: 15px; font-weight: 500;}

        input {
            width: 100%;
            padding: 16px;
            background: #fff;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input:focus {
            border-color: #bc1888;
            box-shadow: 0 0 0 4px rgba(188, 24, 136, 0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            background-size: 200% auto;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 10px 20px rgba(220, 39, 67, 0.3);
        }

        button:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(220, 39, 67, 0.4);
        }

        button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none;}

        #result { margin-top: 25px; }
        .error { color: #dc3545; font-weight: 600; background: #ffe6e6; padding: 10px; border-radius: 8px;}
        .success { color: #28a745; font-weight: 600; margin-bottom: 15px; }
        video { width: 100%; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); background: #000; animation: fadeIn 0.5s ease-in;}
        .dl-btn { margin-top: 15px; background: #1a1a1a; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .dl-btn:hover { background: #333; }

        .loader {
            display: none; width: 40px; height: 40px;
            border: 4px solid #f3f3f3; border-top: 4px solid #bc1888;
            border-radius: 50%; animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer {
            background: rgba(0, 0, 0, 0.6);
            color: white; text-align: center; padding: 15px;
            font-size: 14px; backdrop-filter: blur(8px);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-image"></div>
    </div>

    <header>
        <h1>ReelCatch</h1>
    </header>

    <main>
        <div class="container">
            <h2>Download Reels</h2>
            <p>Paste your link below to grab the video</p>
            
            <input type="text" id="reelUrl" placeholder="https://www.instagram.com/reel/..." autocomplete="off">
            <button id="downloadBtn" onclick="fetchVideo()">Catch Video</button>

            <div id="result">
                <div class="loader" id="loader"></div>
                <div id="resultContent"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ReelCatch. Built for creators.</p>
    </footer>

    <script>
        function createFireflies() {
            for (let i = 0; i < 30; i++) {
                let firefly = document.createElement('div');
                firefly.className = 'firefly';
                firefly.style.left = Math.random() * 100 + 'vw';
                firefly.style.top = Math.random() * 100 + 'vh';
                firefly.style.animationDuration = (Math.random() * 6 + 4) + 's';
                firefly.style.animationDelay = (Math.random() * 5) + 's';
                let size = Math.random() * 3 + 2;
                firefly.style.width = size + 'px';
                firefly.style.height = size + 'px';
                document.body.appendChild(firefly);
            }
        }
        createFireflies();

        async function fetchVideo() {
            const urlInput = document.getElementById('reelUrl').value;
            const resultContent = document.getElementById('resultContent');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('downloadBtn');

            if (!urlInput) {
                resultContent.innerHTML = '<p class="error">Oops! Please enter a URL first.</p>';
                return;
            }

            btn.innerText = 'Catching...';
            btn.disabled = true;
            resultContent.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.success) {
                    resultContent.innerHTML = `
                        <p class="success">Video caught successfully! 🎉</p>
                        <video controls autoplay src="${data.videoUrl}"></video>
                        <a href="${data.videoUrl}" target="_blank" rel="noopener noreferrer" download>
                            <button class="dl-btn">Download / Open Link</button>
                        </a>
                    `;
                } else {
                    resultContent.innerHTML = `<p class="error">${data.error}</p>`;
                }
            } catch (error) {
                loader.style.display = 'none';
                resultContent.innerHTML = '<p class="error">Connection error. Is your server running?</p>';
            } finally {
                btn.innerText = 'Catch Video';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
