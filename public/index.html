<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelCatch | Professional Downloader</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        /* Base & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            color: #fff; /* Changed to white for dark mode */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- THE CINEMATIC IMAGE BACKGROUND --- */
        .bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden;
            background-color: #1a1a1a;
        }

        .bg-image {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background: url('village.jpg') center/cover no-repeat;
            filter: brightness(0.8) contrast(1.1); /* Slightly brighter for dark card */
            animation: kenBurns 30s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.08) translate(-2%, -1%); }
        }

        /* Magical Floating Particles */
        .firefly {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.5); }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-150px) scale(1.5); }
        }

        /* Header */
        header {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        /* --- PREMIUM DARK GLASS CARD --- */
        .container {
            background: rgba(20, 20, 20, 0.75); /* Dark translucent background */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 45px 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle glowing border */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .container h2 { font-size: 30px; color: #ffffff; margin-bottom: 10px; font-weight: 800; }
        .container p { color: #aaaaaa; margin-bottom: 30px; font-size: 16px; font-weight: 400;}

        /* Modern Input Field */
        input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder { color: #777; }

        input:focus {
            border-color: #ee2a7b;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(238, 42, 123, 0.15);
        }

        /* Vibrant Animated Button */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            background-size: 200% auto;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 10px 25px rgba(238, 42, 123, 0.4);
        }

        button:hover {
            background-position: right center;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(238, 42, 123, 0.6);
        }

        button:active { transform: translateY(1px); }
        button:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; box-shadow: none;}

        #result { margin-top: 30px; }
        .error { color: #ff4757; font-weight: 600; background: rgba(255, 71, 87, 0.1); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,71,87,0.3);}
        .success { color: #2ed573; font-weight: 600; margin-bottom: 15px; font-size: 18px;}
        
        video { 
            width: 100%; 
            border-radius: 16px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); 
            background: #000; 
            animation: fadeIn 0.6s ease-out;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px);} 100% { opacity: 1; transform: translateY(0);} }

        .dl-btn { margin-top: 20px; background: #222; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .dl-btn:hover { background: #333; }

        .loader {
            display: none; width: 45px; height: 45px;
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ee2a7b;
            border-radius: 50%; animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer {
            background: rgba(0, 0, 0, 0.8);
            color: #888; text-align: center; padding: 20px;
            font-size: 14px; backdrop-filter: blur(8px);
            z-index: 10; border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-image"></div>
    </div>

    <header>
        <h1>ReelCatch</h1>
    </header>

    <main>
        <div class="container">
            <h2>Download Reels</h2>
            <p>Paste your link below to grab the video</p>
            
            <input type="text" id="reelUrl" placeholder="https://www.instagram.com/reel/..." autocomplete="off">
            <button id="downloadBtn" onclick="fetchVideo()">Catch Video</button>

            <div id="result">
                <div class="loader" id="loader"></div>
                <div id="resultContent"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ReelCatch. Built for creators.</p>
    </footer>

    <script>
        // --- MULTI-COLOR FIREFLIES ---
        function createFireflies() {
            const colors = ['#f9ce34', '#ff7eb3', '#ff9f43']; // Gold, Soft Pink, Sunset Orange
            for (let i = 0; i < 35; i++) {
                let firefly = document.createElement('div');
                let color = colors[Math.floor(Math.random() * colors.length)];
                
                firefly.className = 'firefly';
                firefly.style.background = color;
                firefly.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
                
                firefly.style.left = Math.random() * 100 + 'vw';
                firefly.style.top = Math.random() * 100 + 'vh';
                firefly.style.animationDuration = (Math.random() * 6 + 4) + 's';
                firefly.style.animationDelay = (Math.random() * 5) + 's';
                
                let size = Math.random() * 3 + 2;
                firefly.style.width = size + 'px';
                firefly.style.height = size + 'px';
                document.body.appendChild(firefly);
            }
        }
        createFireflies();

        // --- KEYPAD FUNCTIONALITY (ENTER KEY) ---
        document.getElementById('reelUrl').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevents any default page refresh
                fetchVideo(); // Triggers the download button logic
            }
        });

        // --- FETCH VIDEO LOGIC ---
        async function fetchVideo() {
            const urlInput = document.getElementById('reelUrl').value;
            const resultContent = document.getElementById('resultContent');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('downloadBtn');

            if (!urlInput) {
                resultContent.innerHTML = '<p class="error">Oops! Please enter a URL first.</p>';
                return;
            }

            btn.innerText = 'Catching...';
            btn.disabled = true;
            resultContent.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.success) {
                    resultContent.innerHTML = `
                        <p class="success">Video caught successfully! 🎉</p>
                        <video controls autoplay src="${data.videoUrl}"></video>
                        <a href="${data.videoUrl}" target="_blank" rel="noopener noreferrer" download>
                            <button class="dl-btn">Download / Open Link</button>
                        </a>
                    `;
                } else {
                    resultContent.innerHTML = `<p class="error">${data.error}</p>`;
                }
            } catch (error) {
                loader.style.display = 'none';
                resultContent.innerHTML = '<p class="error">Connection error. Is your server running?</p>';
            } finally {
                btn.innerText = 'Catch Video';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
